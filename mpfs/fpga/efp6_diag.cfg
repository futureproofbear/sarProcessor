set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
echo ">>> hart1 curstate:"
echo [mpfs.hart1_u54_1 curstate]
set pcval [mpfs.hart1_u54_1 reg pc]
echo ">>> hart1 PC = $pcval"
# read the mailbox region (0xB0058000) + a DDR firmware/scratch check
mem2array mb 32 0xB0058000 6
echo [format ">>> mailbox cmd=0x%08x b=0x%08x len=0x%08x res=0x%08x status=0x%08x seq=0x%08x" $mb(0) $mb(1) $mb(2) $mb(3) $mb(4) $mb(5)]
# also check hart0 (E51 monitor) + hart2 states
targets mpfs.hart0
catch { mpfs.hart0 arp_halt }
echo ">>> hart0 curstate:"
catch { echo [mpfs.hart0 curstate] }
catch { echo ">>> hart0 PC = [mpfs.hart0 reg pc]" }
shutdown
