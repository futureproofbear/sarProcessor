set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
echo ">>> PC read #1:"
mpfs.hart1_u54_1 reg pc
mem2array mb 32 0xB0058000 6
echo [format ">>> mailbox cmd=0x%08x b=0x%08x len=0x%08x res=0x%08x status=0x%08x seq=0x%08x" $mb(0) $mb(1) $mb(2) $mb(3) $mb(4) $mb(5)]
echo ">>> resume 2s then re-halt to see if PC moves (firmware alive?)"
resume
sleep 2000
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
echo ">>> PC read #2:"
mpfs.hart1_u54_1 reg pc
shutdown
