set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
foreach {nm base} {CT 0x60000000 WIN 0x60001000 DET 0x60002000 RES 0x60003000 FEED 0x60004000} {
  mem2array a 32 $base 1
  echo [format ">>> %s ap_ctrl@0x%08x = 0x%08x  (b0 start b1 done b2 idle b3 ready)" $nm $base $a(0)]
}
mem2array fst 32 0x60000004 1
echo [format ">>> fabric STATUS 0x60000004 = 0x%08x" $fst(0)]
mem2array dma 32 0x60005010 1
echo [format ">>> DMA I0ST 0x60005010 = 0x%08x (b0 CPLT b1 DWERR b2 DRERR b3 INVDESC)" $dma(0)]
mem2array dop 32 0x60005004 1
echo [format ">>> DMA START_OP 0x60005004 = 0x%08x" $dop(0)]
shutdown
