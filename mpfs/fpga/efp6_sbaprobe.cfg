set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
riscv set_mem_access sysbus
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
echo ">>> SBA PROBE write 0xCAFEBABE -> 0x88000000"
mww 0x88000000 0xCAFEBABE
set rb [read_memory 0x88000000 32 1]
echo ">>> SBA PROBE readback = $rb"
echo ">>> SBA PROBE done"
shutdown
