set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
resume
sleep 20000
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
mem2array t 32 0xB0050038 5
echo [format "tag0x30 rec: tag=0x%08x addr=0x%08x obs=0x%08x exp=0x%08x status=0x%08x" $t(0) $t(1) $t(2) $t(3) $t(4)]
mem2array mb 32 0xB0058000 6
echo [format "mailbox cmd=0x%08x status=0x%08x seq=0x%08x (cmd=0 => reached loop)" $mb(0) $mb(4) $mb(5)]
mem2array sc 32 0x98000000 2
echo [format "SCRATCH[0]=0x%08x (0xdeadbeef if resample wrote it)" $sc(0)]
shutdown
