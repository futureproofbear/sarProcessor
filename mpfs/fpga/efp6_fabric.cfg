# Characterize the fabric accelerator control plane. The self-test froze in
# sar_k_wait polling K_RESAMPLE START/STATUS (0x60003008) -- "reads 0 when done".
# Read every kernel's START/STATUS (+0x08) + the DMA to see which respond.
#   0x00000000 = idle/done   0x00000001 = started/busy   0xffffffff = slave not decoding
set DEVICE MPFS
set COREID 1
source [find board/microchip_riscv_efp6.cfg]

mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000

echo [format ">>> K_CORNER_TURN @0x60000008 = 0x%08x" [lindex [read_memory 0x60000008 32 1] 0]]
echo [format ">>> K_WINDOW      @0x60001008 = 0x%08x" [lindex [read_memory 0x60001008 32 1] 0]]
echo [format ">>> K_DETECT      @0x60002008 = 0x%08x" [lindex [read_memory 0x60002008 32 1] 0]]
echo [format ">>> K_RESAMPLE    @0x60003008 = 0x%08x  <- the stuck one" [lindex [read_memory 0x60003008 32 1] 0]]
echo [format ">>> K_FFT_FEEDER  @0x60004008 = 0x%08x" [lindex [read_memory 0x60004008 32 1] 0]]
echo [format ">>> DMA_CTRL base @0x60005000 = 0x%08x" [lindex [read_memory 0x60005000 32 1] 0]]
echo [format ">>> K_RESAMPLE ctrl@0x60003000 = 0x%08x" [lindex [read_memory 0x60003000 32 1] 0]]
echo [format ">>> K_RESAMPLE arg0@0x6000300c = 0x%08x  (expect BUF_SIG=0x88000000)" [lindex [read_memory 0x6000300c 32 1] 0]]
echo [format ">>> K_RESAMPLE arg3@0x60003018 = 0x%08x  (out: BUF_SCRATCH=0x98000000)" [lindex [read_memory 0x60003018 32 1] 0]]
echo ">>> === FABRIC READ DONE ==="
shutdown
