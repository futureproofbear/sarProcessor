set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000

echo ">>> LOAD START 1MB sig_head -> 0x88000000"
load_image "C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/sig_head.bin" 0x88000000 bin
echo ">>> LOAD DONE; writing CRC mailbox @0xB0058000"

# mailbox layout: +0 cmd, +4 base, +8 len, +C result, +10 status, +14 seq
mww 0xB0058004 0x88000000
mww 0xB0058008 0x00100000
mww 0xB005800C 0x00000000
mww 0xB0058010 0x00000000
mww 0xB0058000 0x43524333

echo ">>> resume hart1 to compute CRC"
resume
sleep 2000
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000

mem2array st 32 0xB0058010 1
mem2array rc 32 0xB005800C 1
mem2array sq 32 0xB0058014 1
echo [format ">>> CRC_STATUS=0x%08x CRC_RESULT=0x%08x SEQ=%d (expect status=0xC0FFEE03 result=0x24775359)" $st(0) $rc(0) $sq(0)]
echo ">>> CRCVERIFY DONE"
shutdown
