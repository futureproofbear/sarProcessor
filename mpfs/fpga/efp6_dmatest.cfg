set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
# seed SRC (0xB0060000) with a pattern, clear DST (0xB0061000)
mww 0xB0060000 0xCAFEBABE
mww 0xB0060004 0x0BADF00D
mww 0xB0061000 0x00000000
mww 0xB0061004 0x00000000
echo ">>> DMA control VER (sanity, control-plane):"
mdw 0x60005000
# clear stale int status (I0CLR@0x18), enable (I0MASK@0x14)
mww 0x60005018 0x0000000F
mww 0x60005014 0x0000000F
# program internal descriptor 0: src@0x68 dst@0x6C bytecnt@0x64 config@0x60
mww 0x60005068 0xB0060000
mww 0x6000506C 0xB0061000
mww 0x60005064 0x00000040
mww 0x60005060 0x0000E000
# also poke START_OP@0x04 (desc0)
mww 0x60005004 0x00000001
sleep 300
echo ">>> DMA int status I0ST@0x10 (b0=CPLT b1=DWERR b2=DRERR b3=INVDESC; 0=nothing/hang):"
mdw 0x60005010
echo ">>> desc0 config readback @0x60 (valid bits latched?):"
mdw 0x60005060
echo ">>> DST after DMA (0xB0061000 -- =0xCAFEBABE if write path works):"
mdw 0xB0061000
mdw 0xB0061004
shutdown
