set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
mem2array fe 32 0x60004000 1
echo [format ">>> FFT_FEEDER ap_ctrl 0x60004000 = 0x%08x (b0 start b1 done b2 idle)" $fe(0)]
mem2array dv 32 0x60005000 1
mem2array ds 32 0x60005010 1
mem2array dop 32 0x60005004 1
echo [format ">>> DMA VER=0x%08x  I0ST=0x%08x (b0 CPLT b1 DWERR b2 DRERR b3 INVDESC)  START_OP=0x%08x" $dv(0) $ds(0) $dop(0)]
mem2array sd 32 0xB0059000 3
echo [format ">>> stream desc @0xB0059000: cfg=0x%08x bytes=0x%08x dst=0x%08x" $sd(0) $sd(1) $sd(2)]
echo ">>> DLL still bypassed?"
mem2array dl 32 0x2000215C 1
echo [format ">>> DLL_STATUS_SR=0x%08x FIC0_LOCK=%d" $dl(0) [expr $dl(0)&1]]
shutdown
