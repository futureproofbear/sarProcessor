# Read the M2 register-verification results: summary globals + the 24-record table
# at 0xB0050000. Records are 5x u32: tag, addr, observed, expected, status
# (status: 0 PASS | 1 FAIL | 2 FAULT | 3 HANG | 4 SKIP).
set DEVICE MPFS
set COREID 1
source [find board/microchip_riscv_efp6.cfg]

mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000

echo [format ">>> g_m2_done   = 0x%08x (expect 0xc0ffee02)" [lindex [read_memory 0x0a008c7c 32 1] 0]]
echo [format ">>> total=%d pass=%d fail=%d fault=%d" \
     [lindex [read_memory 0x0a008c9c 32 1] 0] [lindex [read_memory 0x0a008c98 32 1] 0] \
     [lindex [read_memory 0x0a008c80 32 1] 0] [lindex [read_memory 0x0a008c90 32 1] 0]]
echo [format ">>> first_fail_tag=0x%x  trap: cause=%d addr=0x%08x epc=0x%08x" \
     [lindex [read_memory 0x0a007cf4 32 1] 0] [lindex [read_memory 0x0a008c8c 32 1] 0] \
     [lindex [read_memory 0x0a008c88 32 1] 0] [lindex [read_memory 0x0a008c94 32 1] 0]]

set t [read_memory 0xB0050000 32 120]
for {set i 0} {$i < 24} {incr i} {
    set b [expr {$i * 5}]
    set tag [lindex $t $b]
    if {$tag == 0 && $i > 0} { continue }
    echo [format ">>> rec tag=0x%02x addr=0x%08x obs=0x%08x exp=0x%08x st=%d" \
         $tag [lindex $t [expr {$b+1}]] [lindex $t [expr {$b+2}]] \
         [lindex $t [expr {$b+3}]] [lindex $t [expr {$b+4}]]]
}
echo [format ">>> SCRATCH 0x98000000 = 0x%08x  (0xdeadbeef unchanged=hung-before-write; 0=wrote zero-fill)" [lindex [read_memory 0x98000000 32 1] 0]]
echo ">>> === M2 READ DONE ==="
shutdown
