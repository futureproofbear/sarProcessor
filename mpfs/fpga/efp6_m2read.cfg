set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
echo ">>> M2 results table @0xB0050000 (tag/status records):"
mem2array r 32 0xB0050000 24
for {set i 0} {$i < 24} {incr i 4} {
  echo [format "  +0x%02x: 0x%08x 0x%08x 0x%08x 0x%08x" [expr $i*4] $r($i) $r([expr $i+1]) $r([expr $i+2]) $r([expr $i+3])]
}
shutdown
