set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
mem2array a 32 0x2000215C 1
after 1000
mem2array b 32 0x2000215C 1
set v $a(0)
echo [format ">>> DLL_STATUS_SR read1 = 0x%08x  read2 = 0x%08x" $a(0) $b(0)]
echo [format "    FIC0_LOCK=%d FIC1_LOCK=%d FIC2_LOCK=%d  (1=DLL locked; 0=NOT locked=BUG at 62.5MHz)" [expr ($v>>0)&1] [expr ($v>>1)&1] [expr ($v>>2)&1]]
mem2array c 32 0x2000210C 1
echo [format ">>> CLOCK_CONFIG_CR @0x2000210C = 0x%08x (fabric/MSS clock divisors)" $c(0)]
shutdown
