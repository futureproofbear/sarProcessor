# OpenOCD-only SAR flow: examine -> halt U54_1 -> stage DDR -> call sar_form_image
# -> dump OUT, all in one continuous block so the FlashPro HID never idles.
set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]

init
echo ">>> examined; halting U54_1"
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
echo ">>> U54_1 halted"
reg pc

echo ">>> staging DDR (sig + geometry + job)"
load_image C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/sig.bin      0x88000000 bin
load_image C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/f0.bin       0xB0100000 bin
load_image C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/df.bin       0xB0108000 bin
load_image C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/pr.bin       0xB0110000 bin
load_image C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/tans.bin     0xB0118000 bin
load_image C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/invorder.bin 0xB0120000 bin
load_image C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/krgrid.bin   0xB0128000 bin
load_image C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/kcgrid.bin   0xB0130000 bin
load_image C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/hamr.bin     0xB0138000 bin
load_image C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/hamc.bin     0xB0140000 bin
load_image C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/job.bin      0xB0040000 bin
echo ">>> DDR staged"

echo ">>> calling sar_form_image(0) on U54_1"
reg pc 0x0a000306
reg a0 0
reg ra 0x0a004f4a
bp 0x0a004f4a 2 hw
resume
mpfs.hart1_u54_1 arp_waitstate halted 300000
rbp 0x0a004f4a
echo ">>> sar_form_image returned; status (a0):"
reg a0
echo ">>> fabric STATUS @0x60000004:"
mdw 0x60000004
echo ">>> fabric BFP @0x6000001C:"
mdw 0x6000001C

echo ">>> dumping OUT"
dump_image C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/out.bin 0xA8000000 0x08000000
echo ">>> === SAR FLOW DONE ==="
shutdown
