# Full 97MB sig.bin -> DDR 0x88000000 in 8MB chunks (progress + resumable), then on-target CRC verify.
set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
mpfs.hart1_u54_1 configure -work-area-phys 0xB0060000 -work-area-size 0x10000 -work-area-backup 0
echo ">>> halted; loading full sig.bin (97MB) in 8MB chunks"
load_image "C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/sigchunk_00" 0x88000000 bin
echo ">>> sigchunk_00 -> 0x88000000 done"
load_image "C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/sigchunk_01" 0x88800000 bin
echo ">>> sigchunk_01 -> 0x88800000 done"
load_image "C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/sigchunk_02" 0x89000000 bin
echo ">>> sigchunk_02 -> 0x89000000 done"
load_image "C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/sigchunk_03" 0x89800000 bin
echo ">>> sigchunk_03 -> 0x89800000 done"
load_image "C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/sigchunk_04" 0x8A000000 bin
echo ">>> sigchunk_04 -> 0x8A000000 done"
load_image "C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/sigchunk_05" 0x8A800000 bin
echo ">>> sigchunk_05 -> 0x8A800000 done"
load_image "C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/sigchunk_06" 0x8B000000 bin
echo ">>> sigchunk_06 -> 0x8B000000 done"
load_image "C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/sigchunk_07" 0x8B800000 bin
echo ">>> sigchunk_07 -> 0x8B800000 done"
load_image "C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/sigchunk_08" 0x8C000000 bin
echo ">>> sigchunk_08 -> 0x8C000000 done"
load_image "C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/sigchunk_09" 0x8C800000 bin
echo ">>> sigchunk_09 -> 0x8C800000 done"
load_image "C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/sigchunk_10" 0x8D000000 bin
echo ">>> sigchunk_10 -> 0x8D000000 done"
load_image "C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/sigchunk_11" 0x8D800000 bin
echo ">>> sigchunk_11 -> 0x8D800000 done"
echo ">>> all chunks written; CRC-verifying full 97MB sig.bin on-target"
if {[catch {verify_image "C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/sig.bin" 0x88000000 bin} e]} { echo ">>> SIG CRC FAIL: $e" } else { echo ">>> SIG CRC OK -- full 97MB verified" }
echo ">>> SIGLOAD DONE"
shutdown
