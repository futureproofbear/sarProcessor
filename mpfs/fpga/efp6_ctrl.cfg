set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
echo ">>> reading FABRIC control regs via FIC0 (CIC control plane)"
mem2array dma 32 0x60005000 4
echo [format ">>> DMA-ctrl 0x60005000 = 0x%08x 0x%08x 0x%08x 0x%08x (VER expect 0x00020064)" $dma(0) $dma(1) $dma(2) $dma(3)]
mem2array ct 32 0x60000008 2
echo [format ">>> CT START 0x60000008 = 0x%08x 0x%08x" $ct(0) $ct(1)]
mem2array fe 32 0x60004008 2
echo [format ">>> FEED START 0x60004008 = 0x%08x 0x%08x" $fe(0) $fe(1)]
shutdown
