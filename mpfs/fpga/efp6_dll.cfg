set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
mem2array d 32 0x2000215C 1
mem2array p 32 0x2000214C 1
set v $d(0)
echo [format ">>> DLL_STATUS_SR @0x2000215C = 0x%08x" $v]
echo [format "    FIC0_LOCK(b0)=%d  FIC1_LOCK(b1)=%d  FIC2_LOCK(b2)=%d" [expr ($v>>0)&1] [expr ($v>>1)&1] [expr ($v>>2)&1]]
echo [format "    FIC0_UNLOCK(b8)=%d FIC1_UNLOCK(b9)=%d FIC2_UNLOCK(b10)=%d  (unlock=1 means DLL lost lock)" [expr ($v>>8)&1] [expr ($v>>9)&1] [expr ($v>>10)&1]]
echo [format ">>> PLL_STATUS_SR @0x2000214C = 0x%08x (MSS PLL, sanity - should show locks)" $p(0)]
shutdown
