set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
echo ">>> PC#1:"; reg pc
echo ">>> resume 2s, re-halt:"; resume; sleep 2000
mpfs.hart1_u54_1 arp_halt; mpfs.hart1_u54_1 arp_waitstate halted 5000
echo ">>> PC#2:"; reg pc
echo ">>> eNVM firmware present? (read boot region 0x20220000):"
mem2array ev 32 0x20220000 4
echo [format ">>> eNVM[0..3]=0x%08x 0x%08x 0x%08x 0x%08x" $ev(0) $ev(1) $ev(2) $ev(3)]
shutdown
