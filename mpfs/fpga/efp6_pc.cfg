set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
set pc1 [reg pc]
echo "PCLINE1: $pc1"
resume; sleep 1000; mpfs.hart1_u54_1 arp_halt; mpfs.hart1_u54_1 arp_waitstate halted 5000
set pc2 [reg pc]
echo "PCLINE2: $pc2"
shutdown
