set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
reg pc
mem2array ev 32 0x20220000 4
echo [format ">>> ENVM 0x%08x 0x%08x 0x%08x 0x%08x" $ev(0) $ev(1) $ev(2) $ev(3)]
mem2array dd 32 0x80000000 4
echo [format ">>> DDR80 0x%08x 0x%08x 0x%08x 0x%08x" $dd(0) $dd(1) $dd(2) $dd(3)]
resume; sleep 1500; mpfs.hart1_u54_1 arp_halt; mpfs.hart1_u54_1 arp_waitstate halted 5000
reg pc
shutdown
