set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init

# Establish clean, noise-immune physical clock
adapter speed 2000

targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000

echo ">>> LOAD START 1MB sig_head -> 0x88000000 (2MHz)"
load_image "C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/sig_head.bin" 0x88000000 bin
echo ">>> LOAD DONE"

# CORRECTED SYNTAX: Read memory as 32-bit arrays natively
set h_list [read_memory 0x88000000 -as_words 4]
set t_list [read_memory 0x880ffff0 -as_words 4]

set h_hex ""
foreach word $h_list { append h_hex [format " %08x" $word] }
set t_hex ""
foreach word $t_list { append t_hex [format " %08x" $word] }

echo ">>> RB_HEAD =$h_hex"
echo ">>> RB_TAIL =$t_hex"
echo ">>> RATE2M DONE"
shutdown
