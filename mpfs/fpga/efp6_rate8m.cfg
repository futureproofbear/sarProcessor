set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
riscv set_mem_access sysbus
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
mpfs.hart1_u54_1 configure -work-area-phys 0xB0060000 -work-area-size 0x10000 -work-area-backup 0
echo ">>> LOAD START 8MB sigchunk_00 -> 0x88000000"
load_image "C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/sigchunk_00" 0x88000000 bin
echo ">>> LOAD DONE"
if {[catch {verify_image "C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/sigchunk_00" 0x88000000 bin} e]} {
  echo ">>> VERIFY FAIL: $e"
} else {
  echo ">>> VERIFY OK"
}
echo ">>> RATE8M DONE"
shutdown
