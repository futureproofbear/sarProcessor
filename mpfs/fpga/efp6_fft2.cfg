set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
foreach {nm base} {CT 0x60000000 WIN 0x60001000 DET 0x60002000 RES 0x60003000 FEED 0x60004000} {
  mem2array c0 32 $base 1
  mem2array c8 32 [expr $base+8] 1
  echo [format ">>> %-4s  ap_ctrl@+0=0x%08x  HLS_START@+8=0x%08x  (START: 1=running/not-done, 0=done)" $nm $c0(0) $c8(0)]
}
mem2array fa 32 0x6000400c 1
mem2array fb 32 0x60004010 1
echo [format ">>> FEED ARG0(src)@+0c=0x%08x  ARG1(nbeats)@+10=0x%08x" $fa(0) $fb(0)]
shutdown
