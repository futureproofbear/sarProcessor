set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000

set J "C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full"

echo ">>> LOAD geometry tables + JOB"
load_image "$J/f0.bin"       0xB0100000 bin
load_image "$J/df.bin"       0xB0108000 bin
load_image "$J/pr.bin"       0xB0110000 bin
load_image "$J/tans.bin"     0xB0118000 bin
load_image "$J/invorder.bin" 0xB0120000 bin
load_image "$J/krgrid.bin"   0xB0128000 bin
load_image "$J/kcgrid.bin"   0xB0130000 bin
load_image "$J/hamr.bin"     0xB0138000 bin
load_image "$J/hamc.bin"     0xB0140000 bin
load_image "$J/job.bin"      0xB0040000 bin
echo ">>> LOAD done"

# CRC mailbox / PIPE command at 0xB0058000: +0 cmd +4 base +8 len +C result +10 status +14 seq
mww 0xB0058004 0x00000000
mww 0xB0058008 0x00000000
mww 0xB005800C 0x00000000
mww 0xB0058010 0x00000000
mww 0xB0058000 0x50495045
echo ">>> PIPE command issued; resume hart1"
resume
sleep 120000
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000

mem2array st 32 0xB0058010 1
mem2array rc 32 0xB005800C 1
mem2array sq 32 0xB0058014 1
echo [format ">>> PIPE_STATUS=0x%08x PIPE_RESULT=%d SEQ=%d (status 0xC0FFEE03=done; result 0=OK else stage 1..7)" $st(0) $rc(0) $sq(0)]
mem2array dbg 32 0xB0058020 8
echo [format ">>> DMA VER=0x%08x START=0x%08x INTR0=0x%08x" $dbg(0) $dbg(1) $dbg(2)]
echo [format ">>> DMA desc0 CFG=0x%08x BYTECNT=0x%08x SRC=0x%08x DST=0x%08x" $dbg(3) $dbg(4) $dbg(5) $dbg(6)]
echo [format ">>> FEEDER_START(busy)=0x%08x" $dbg(7)]
echo ">>> PIPE_RUN DONE"
shutdown
shutdown
