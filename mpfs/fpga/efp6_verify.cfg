set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
echo ">>> let firmware boot + run M2 battery (25s)"
resume
sleep 25000
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
mem2array d 32 0x2000215C 1
set v $d(0)
echo [format ">>> DLL_STATUS_SR = 0x%08x  FIC0_LOCK(b0)=%d FIC1(b1)=%d FIC2(b2)=%d  (1=locked/bypassed-OK, 0=BROKEN)" $v [expr ($v>>0)&1] [expr ($v>>1)&1] [expr ($v>>2)&1]]
mem2array r 32 0xB0050000 120
for {set i 0} {$i < 120} {incr i 5} {
  set tag $r($i)
  if {$tag == 0x30 || $tag == 0x40} { echo [format ">>> M2 tag=0x%02x addr=0x%08x obs=0x%08x exp=0x%08x status=0x%08x  (status 0=PASS, 3=HANG)" $tag $r([expr $i+1]) $r([expr $i+2]) $r([expr $i+3]) $r([expr $i+4])] }
}
mem2array mb 32 0xB0058000 6
echo [format ">>> mailbox cmd=0x%08x status=0x%08x (cmd=0 => reached loop)" $mb(0) $mb(4)]
shutdown
