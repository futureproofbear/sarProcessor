set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
adapter speed 15000

# STEP 1: Select target and force physical halt FIRST
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000

# STEP 2: Configure work area while halted
mpfs.hart1_u54_1 configure -work-area-phys 0xB0060000 -work-area-size 0x10000 -work-area-backup 0

# STEP 3: Now that the core is structurally halted, lock the access mode exclusively to sysbus
riscv set_mem_access sysbus

# STEP 4: Run the test
echo ">>> LOAD START 1MB sysbus"
load_image "C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full/sig_head.bin" 0x88000000 bin
echo ">>> LOAD DONE"
echo ">>> USER_SBA DONE"
shutdown
