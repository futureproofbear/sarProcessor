# Confirm the resample kernel's start args landed and the coeff/SIG data is in
# DDR -- to separate "kernel hung on a no-response AXI read" from "bad args/data".
set DEVICE MPFS
set COREID 1
source [find board/microchip_riscv_efp6.cfg]

mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000

echo [format ">>> RESAMPLE arg0 @0x6000300c = 0x%08x  (expect 0x88000000 SIG in)" [lindex [read_memory 0x6000300c 32 1] 0]]
echo [format ">>> RESAMPLE arg1 @0x60003010 = 0x%08x  (idx ptr, ~0xb0148000)"     [lindex [read_memory 0x60003010 32 1] 0]]
echo [format ">>> RESAMPLE arg2 @0x60003014 = 0x%08x  (wq ptr)"                    [lindex [read_memory 0x60003014 32 1] 0]]
echo [format ">>> RESAMPLE arg3 @0x60003018 = 0x%08x  (expect 0x98000000 SCRATCH out)" [lindex [read_memory 0x60003018 32 1] 0]]
echo [format ">>> coeff idx[0]  @0xb0148000 = 0x%08x  (expect 0xffffffff = idx -1)" [lindex [read_memory 0xb0148000 32 1] 0]]
echo [format ">>> SIG[0]        @0x88000000 = 0x%08x" [lindex [read_memory 0x88000000 32 1] 0]]
echo [format ">>> SCRATCH[0]    @0x98000000 = 0x%08x" [lindex [read_memory 0x98000000 32 1] 0]]
echo ">>> === DATA READ DONE ==="
shutdown
