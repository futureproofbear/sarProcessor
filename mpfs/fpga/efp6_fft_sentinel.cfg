set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000

# Fill the start of SCRATCH (feeder source) with a non-zero constant so the FFT
# output is non-zero and a DMA writeback is detectable. 256 words = one+ CoreFFT
# input frame's worth of leading non-zero data.
for {set i 0} {$i < 256} {incr i} { mww [expr {0x98000000 + $i*4}] 0x00010001 }

mem2array b 32 0x98000000 4
echo [format ">>> SCRATCH before: 0x%08x 0x%08x 0x%08x 0x%08x" $b(0) $b(1) $b(2) $b(3)]

# FHLD: arm DMA (dst=SCRATCH) + start feeder
mww 0xB0058004 0x00000000
mww 0xB0058008 0x00000000
mww 0xB005800C 0x00000000
mww 0xB0058010 0x00000000
mww 0xB0058000 0x46484C44
resume
sleep 6000
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000

mem2array a 32 0x98000000 4
echo [format ">>> SCRATCH after:  0x%08x 0x%08x 0x%08x 0x%08x" $a(0) $a(1) $a(2) $a(3)]
echo ">>> FFT_SENTINEL DONE (after != before => DMA wrote FFT output)"
shutdown
