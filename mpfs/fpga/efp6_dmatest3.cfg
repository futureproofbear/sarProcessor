set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
mww 0xB0060000 0xCAFEBABE
mww 0xB0061000 0x00000000
mww 0x60005018 0x0000000F
mww 0x60005014 0x0000000F
mww 0x60005068 0xB0060000
mww 0x6000506C 0xB0061000
mww 0x60005064 0x00000040
mww 0x60005060 0x0000E000
mem2array ci 32 0x60005060 1
echo [format ">>> config IMMEDIATE (after write, no delay) = 0x%08x  (0xE000=src/dst valid latched; 0x8000=only DESCVALID)" $ci(0)]
mww 0x60005004 0x00000001
sleep 400
mem2array s 32 0x60005010 1
mem2array cd 32 0x60005060 1
echo [format ">>> I0ST = 0x%08x (b0=CPLT b1=DWERR b2=DRERR b3=INVDESC)" $s(0)]
echo [format ">>> config DELAYED = 0x%08x" $cd(0)]
mem2array k 32 0x60003008 1
echo [format ">>> post-test RESAMPLE ctrl read 0x60003008 = 0x%08x (if this returns, control-plane/JTAG still alive)" $k(0)]
shutdown
