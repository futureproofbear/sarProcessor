set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
echo ">>> let hart1 run 30s (battery), then halt + read"
resume
sleep 30000
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
# read 40 records x 5 u32 = 200 words
mem2array r 32 0xB0050000 200
for {set i 0} {$i < 200} {incr i 5} {
  set tag $r($i)
  if {$tag != 0} { echo [format "  tag=0x%02x addr=0x%08x obs=0x%08x exp=0x%08x status=0x%08x" $tag $r([expr $i+1]) $r([expr $i+2]) $r([expr $i+3]) $r([expr $i+4])] }
}
mem2array mb 32 0xB0058000 6
echo [format ">>> mailbox cmd=0x%08x status=0x%08x (cmd=0 => reached loop)" $mb(0) $mb(4)]
shutdown
