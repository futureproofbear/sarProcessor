# SHORT read of the autonomous self-test results. COREID 1 (hart 1 only) +
# minimal ops (halt + 4 mdw + pc) so it stays well inside the HID budget.
set DEVICE MPFS
set COREID 1
source [find board/microchip_riscv_efp6.cfg]

echo ">>> halting U54_1 to read self-test results"
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000

echo [format ">>> g_sar_done   @0x0a008f4c = 0x%08x  (expect 0xc0ffee01)" [lindex [read_memory 0x0a008f4c 32 1] 0]]
echo [format ">>> g_sar_status @0x0a007fc4 = 0x%08x  (0=SAR_SEQ_OK; 2..8=stage timeout)" [lindex [read_memory 0x0a007fc4 32 1] 0]]
echo [format ">>> fabric STATUS @0x60000004 = 0x%08x  (bit0 DONE / bit2 ERR)" [lindex [read_memory 0x60000004 32 1] 0]]
echo [format ">>> fabric BFP    @0x6000001c = 0x%08x" [lindex [read_memory 0x6000001c 32 1] 0]]
echo [format ">>> hart1 pc      = 0x%x  (u54_1=0x0a00553c, sar_form_image=0x0a000306..)" [lindex [get_reg pc] 1]]
echo [format ">>> g_sar_keep    @0x0a00acd8 = 0x%08x  (nonzero => u54_1 ran past wake)" [lindex [read_memory 0x0a00acd8 32 1] 0]]
echo ">>> === READ DONE ==="
reg pc
shutdown
