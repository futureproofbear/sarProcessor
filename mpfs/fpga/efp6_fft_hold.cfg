set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
# mailbox FHLD: arm DMA + start FFT feeder, hold the stall live (no wait)
mww 0xB0058004 0x00000000
mww 0xB0058008 0x00000000
mww 0xB005800C 0x00000000
mww 0xB0058010 0x00000000
mww 0xB0058000 0x46484C44
echo ">>> FHLD issued; resuming hart1 (feeder starts + stalls, held in fabric)"
resume
sleep 4000
mem2array sq 32 0xB0058014 1
echo [format ">>> FHLD seq=%d (1 = command serviced)" $sq(0)]
echo ">>> hart1 left RUNNING; releasing FlashPro6 for SmartDebug"
shutdown
