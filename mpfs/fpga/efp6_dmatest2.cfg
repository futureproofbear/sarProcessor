set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
mww 0xB0060000 0xCAFEBABE
mww 0xB0060004 0x0BADF00D
mww 0xB0061000 0x00000000
mww 0xB0061004 0x00000000
mem2array v 32 0x60005000 1
echo [format ">>> DMA VER (control-plane sanity) = 0x%08x" $v(0)]
mww 0x60005018 0x0000000F
mww 0x60005014 0x0000000F
mww 0x60005068 0xB0060000
mww 0x6000506C 0xB0061000
mww 0x60005064 0x00000040
mww 0x60005060 0x0000E000
mww 0x60005004 0x00000001
sleep 300
mem2array s 32 0x60005010 1
mem2array c 32 0x60005060 1
mem2array d 32 0xB0061000 2
echo [format ">>> I0ST status = 0x%08x  (b0=CPLT b1=DWERR b2=DRERR b3=INVDESC; 0x0=nothing/hang)" $s(0)]
echo [format ">>> desc0 config readback = 0x%08x" $c(0)]
echo [format ">>> DST[0]=0x%08x DST[1]=0x%08x  (0xCAFEBABE/0x0BADF00D if write path works)" $d(0) $d(1)]
shutdown
