set DEVICE MPFS
set COREID 1
source [find board/microchip_riscv_efp6.cfg]
riscv set_command_timeout_sec 8
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
echo [format ">>> SANITY  RESAMPLE @0x60003008 = 0x%08x (control plane, must respond)" [lindex [read_memory 0x60003008 32 1] 0]]
echo ">>> --- now probing DMA control slave (RC1 test) ---"
echo [format ">>> DMA VER   @0x60005000 = 0x%08x" [lindex [read_memory 0x60005000 32 1] 0]]
echo [format ">>> DMA START @0x60005004 = 0x%08x" [lindex [read_memory 0x60005004 32 1] 0]]
echo ">>> === DMA PROBE DONE ==="
shutdown
