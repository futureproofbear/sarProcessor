# Load SAR inputs to DDR over JTAG + verify each (read-back byte-compare). Small buffers full;
# sig as a 1MB chunk (full 97MB sig over JTAG is the documented bulk-transport bottleneck).
set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
mpfs.hart1_u54_1 configure -work-area-phys 0xB0060000 -work-area-size 0x10000 -work-area-backup 0
echo ">>> U54_1 halted; work-area set; loading + verifying DDR"
set B "C:/Users/lkwangsi/Documents/github/sarProcessor/mpfs/host/jtag_full"
set ::pass 0
set ::fail 0
proc lv {f a} {
    if {[catch {load_image "$::B/$f" $a bin} e]} { echo ">>> LOAD-FAIL  $f : $e"; incr ::fail; return }
    if {[catch {verify_image "$::B/$f" $a bin} e]} { echo ">>> VERIFY-FAIL $f @ $a"; incr ::fail } else { echo ">>> OK $f @ $a"; incr ::pass }
}
lv job.bin      0xB0040000
lv f0.bin       0xB0100000
lv df.bin       0xB0108000
lv pr.bin       0xB0110000
lv tans.bin     0xB0118000
lv invorder.bin 0xB0120000
lv krgrid.bin   0xB0128000
lv kcgrid.bin   0xB0130000
lv hamr.bin     0xB0138000
lv hamc.bin     0xB0140000
lv sig_head.bin 0x88000000
echo ">>> LOADVERIFY DONE  pass=$::pass fail=$::fail"
shutdown
