set DEVICE MPFS
source [find board/microchip_riscv_efp6.cfg]
init
targets mpfs.hart1_u54_1
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
catch { riscv set_mem_access progbuf } ea; echo "set_mem_access progbuf rc=$ea"
mww 0xB0058004 0x80000000
mww 0xB0058008 0x00001000
mww 0xB005800C 0x00000000
mww 0xB0058010 0x00000000
mww 0xB0058000 0x43524333
echo ">>> CRC cmd issued (progbuf); resume"
resume
sleep 6000
mpfs.hart1_u54_1 arp_halt
mpfs.hart1_u54_1 arp_waitstate halted 5000
mem2array m 32 0xB0058000 6
echo [format ">>> after CRC(pb): cmd=0x%08x result=0x%08x status=0x%08x seq=0x%08x" $m(0) $m(3) $m(4) $m(5)]
shutdown
